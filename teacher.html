<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แดชบอร์ดผู้สอน - ระบบประเมินการสอน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner" style="width: 40px; height: 40px;"></div>
    <p class="mt-2" style="font-size: 1.1rem;">กำลังลบข้อมูล...</p>
  </div>

  <div id="navbar"></div>

  <div class="container-wide">
    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px;">แดชบอร์ดผู้สอน</h1>

    <!-- Loading -->
    <div id="teacher-loading" class="loading" style="padding: 60px 24px;">
      <div class="spinner" style="width: 40px; height: 40px;"></div>
      <p class="mt-2" style="font-size: 1.1rem;">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Stats -->
    <div id="teacher-stats" class="mb-3 hidden"></div>

    <!-- Actions -->
    <div id="teacher-actions" class="flex justify-between items-center mb-2 hidden">
      <h2 style="font-size: 1.2rem; font-weight: 600;">แบบสอบถามของฉัน</h2>
      <a href="teacher-create.html" class="btn btn-primary">+ สร้างแบบสอบถามใหม่</a>
    </div>

    <!-- Questionnaires List -->
    <div id="my-questionnaires" class="hidden"></div>
  </div>

  <!-- Link Modal -->
  <div id="link-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">คัดลอก Link สำหรับทำแบบสอบถาม</div>
      <p class="text-muted mb-2" style="font-size: 0.9rem;">ส่ง link นี้ให้ผู้เรียนเพื่อเข้าทำแบบสอบถาม</p>
      <div class="form-group">
        <input type="text" id="survey-link" readonly style="font-family: monospace; font-size: 0.9rem;">
      </div>
      <div class="text-center mb-2">
        <div id="qr-code" style="display: inline-block; padding: 16px; background: white; border-radius: 8px; border: 1px solid #E5E7EB;"></div>
        <p class="text-muted mt-1" style="font-size: 0.8rem;">สแกน QR Code เพื่อเข้าทำแบบสอบถาม</p>
      </div>
      <div class="flex gap-1">
        <button class="btn btn-primary" onclick="Teacher.copyLink()">คัดลอก</button>
        <button class="btn btn-outline" onclick="Teacher.closeLinkModal()">ปิด</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/teacher.js"></script>
  <script>
    // ตรวจสอบ authentication
    const user = App.requireAuth('teacher');
    if (user) {
      // sync ข้อมูลจาก Google Sheets แล้วแสดง
      async function loadTeacherData() {
        await Teacher.syncFromSheets();
        Teacher.renderStats();
        Teacher.renderMyQuestionnaires();
        // ซ่อน loading แล้วแสดงข้อมูล
        document.getElementById('teacher-loading').classList.add('hidden');
        document.getElementById('teacher-stats').classList.remove('hidden');
        document.getElementById('teacher-actions').classList.remove('hidden');
        document.getElementById('my-questionnaires').classList.remove('hidden');
      }
      loadTeacherData();
    }
  </script>
</body>
</html>
