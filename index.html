<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบประเมินความพึงพอใจในการสอน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container" style="max-width: 600px; margin-top: 60px;">
    <div class="text-center mb-3">
      <h1 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 8px;">📋 ระบบประเมินความพึงพอใจในการสอน</h1>
      <p class="text-muted">เข้าสู่ระบบหรือเข้าทำแบบสอบถาม</p>
    </div>

    <!-- เข้าทำแบบสอบถาม -->
    <div class="card mb-3">
      <div class="card-header">เข้าทำแบบสอบถาม</div>
      <p class="text-muted mb-2" style="font-size: 0.95rem;">กรอกรหัสที่ได้รับจากผู้สอนเพื่อเข้าทำแบบสอบถาม</p>
      <div class="form-group">
        <input type="text" id="survey-code" placeholder="กรอกรหัส เช่น ABC123" 
               maxlength="6" style="text-transform: uppercase; letter-spacing: 2px; text-align: center; font-size: 1.2rem;">
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="enterSurvey()">เข้าทำแบบสอบถาม</button>
      <div id="code-error" class="mt-2 hidden"></div>
    </div>

    <!-- เข้าสู่ระบบผู้สอน -->
    <div class="card">
      <div class="card-header">เข้าสู่ระบบผู้สอน</div>
      <p class="text-muted mb-2" style="font-size: 0.95rem;">สำหรับผู้สอนที่ต้องการจัดการแบบสอบถาม</p>
      <a href="teacher-login.html" class="btn btn-outline" style="width: 100%;">เข้าสู่ระบบผู้สอน</a>
    </div>

    <div class="text-center mt-3">
      <a href="admin.html" class="text-muted" style="font-size: 0.85rem;">⚙️ ตั้งค่าระบบ</a>
    </div>
  </div>

  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function enterSurvey() {
      const code = document.getElementById('survey-code').value.trim().toUpperCase();
      if (!code) {
        App.showError('code-error', 'กรุณากรอกรหัส');
        return;
      }

      const result = await Auth.validateSurveyCode(code);
      if (result.valid) {
        window.location.href = `survey.html?code=${code}`;
      } else {
        App.showError('code-error', result.message);
      }
    }

    // Enter key
    document.getElementById('survey-code').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') enterSurvey();
    });
  </script>
</body>
</html>
